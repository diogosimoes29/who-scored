name: Atualizar dados

on:
  schedule:
    - cron: '0 */6 * * *'   # de 6 em 6 horas (UTC)
  workflow_dispatch: {}      # permite correr à mão no separador Actions

permissions:
  contents: write            # necessário para o push do commit automático

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:data
      - name: Commit se houver alterações
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- src/data; then
            echo "Sem alterações nos dados."
          else
            git add src/data/matches.json src/data/players.json
            git commit -m "chore(data): atualizar resultados (automático)"
            git push
          fi
